name: Deploy Trigger.dev tasks

on:
  push:
    branches:
      - main
    paths:
      - "trigger/**"
      - "trigger.config.ts"
      - "src/lib/rag/**"
  workflow_dispatch:

jobs:
  deploy-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Trigger.dev tasks
        run: npx trigger.dev@latest deploy
        env:
          TRIGGER_SECRET_KEY: ${{ secrets.TRIGGER_SECRET_KEY }}
