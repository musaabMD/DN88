name: Set Trigger Worker secret

on:
  workflow_dispatch:
    inputs:
      trigger_secret_key:
        description: Trigger.dev DEV secret key (tr_dev_...)
        required: true
        type: string

jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Put TRIGGER_SECRET_KEY on dn88-api Worker
        run: printf '%s' "$TRIGGER_SECRET_KEY" | npx wrangler secret put TRIGGER_SECRET_KEY -c workers/dn88/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TRIGGER_SECRET_KEY: ${{ github.event.inputs.trigger_secret_key }}
