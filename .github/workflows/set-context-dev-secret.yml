name: Set Context.dev Worker secret

on:
  workflow_dispatch:
    inputs:
      context_dev_api_key:
        description: Context.dev API key (ctxt_secret_...)
        required: true
        type: string

jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Put CONTEXT_DEV_API_KEY on dn88-api Worker
        run: printf '%s' "$CONTEXT_DEV_API_KEY" | npx wrangler secret put CONTEXT_DEV_API_KEY -c workers/dn88/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTEXT_DEV_API_KEY: ${{ github.event.inputs.context_dev_api_key }}
