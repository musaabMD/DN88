name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check Cloudflare credentials
        id: cloudflare
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare deploy secrets are not configured. Skipping Pages deploy."
            echo "Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID at Settings → Secrets and variables → Actions, then re-run."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy out --project-name=dn88

      - name: Deploy skipped summary
        if: steps.cloudflare.outputs.ready != 'true'
        run: |
          echo "Build succeeded but deploy was skipped (missing CLOUDFLARE_API_TOKEN)."
          echo "Required secrets: CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID (5000e0a4f0ca6dd90b08bde9dc11ccb9)."
