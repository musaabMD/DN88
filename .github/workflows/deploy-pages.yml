name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

env:
  PRODUCTION_API_URL: https://api.drnote.co

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply MedGenius D1 migration
        continue-on-error: true
        run: npm run medgenius:migrate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy DN88 Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.108.0"
          command: deploy -c workers/dn88/wrangler.jsonc

      - name: Set Worker secrets
        continue-on-error: true
        run: |
          put_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler secret put "$name" -c workers/dn88/wrangler.jsonc
            fi
          }

          put_secret CLERK_SECRET_KEY "$CLERK_SECRET_KEY"
          put_secret CLERK_PUBLISHABLE_KEY "$CLERK_PUBLISHABLE_KEY"
          put_secret CLERK_WEBHOOK_SECRET "$CLERK_WEBHOOK_SECRET"
          put_secret STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY"
          put_secret STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"
          put_secret STRIPE_PRICE_MONTHLY "$STRIPE_PRICE_MONTHLY"
          put_secret STRIPE_PRICE_YEARLY "$STRIPE_PRICE_YEARLY"
          put_secret STRIPE_PRICE_STUDENT_MONTHLY "$STRIPE_PRICE_STUDENT_MONTHLY"
          put_secret STRIPE_PRICE_STUDENT_YEARLY "$STRIPE_PRICE_STUDENT_YEARLY"
          put_secret STRIPE_PRICE_PRO_MONTHLY "$STRIPE_PRICE_PRO_MONTHLY"
          put_secret STRIPE_PRICE_PRO_YEARLY "$STRIPE_PRICE_PRO_YEARLY"
          put_secret CATALOG_SYNC_SECRET "$CATALOG_SYNC_SECRET"
          put_secret OPENAI_API_KEY "$OPENAI_API_KEY"
          put_secret OPENROUTER_API_KEY "$OPENROUTER_API_KEY"
          put_secret CONTEXT_DEV_API_KEY "$CONTEXT_DEV_API_KEY"
          put_secret ADMIN_BOOTSTRAP_IDS "$ADMIN_BOOTSTRAP_IDS"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_PRICE_YEARLY: ${{ secrets.STRIPE_PRICE_YEARLY }}
          STRIPE_PRICE_STUDENT_MONTHLY: ${{ secrets.STRIPE_PRICE_STUDENT_MONTHLY }}
          STRIPE_PRICE_STUDENT_YEARLY: ${{ secrets.STRIPE_PRICE_STUDENT_YEARLY }}
          STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY: ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
          CATALOG_SYNC_SECRET: ${{ secrets.CATALOG_SYNC_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CONTEXT_DEV_API_KEY: ${{ secrets.CONTEXT_DEV_API_KEY }}
          ADMIN_BOOTSTRAP_IDS: ${{ secrets.ADMIN_BOOTSTRAP_IDS }}

      - name: Build
        run: |
          export NEXT_PUBLIC_DN88_API_URL="${NEXT_PUBLIC_DN88_API_URL:-$PRODUCTION_API_URL}"
          npm run build
        env:
          PRODUCTION_API_URL: ${{ env.PRODUCTION_API_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_DOMAIN: drnote.co
          NEXT_PUBLIC_DN88_API_URL: ${{ secrets.NEXT_PUBLIC_DN88_API_URL }}
          NEXT_PUBLIC_CATALOG_API_ENABLED: "true"
          CATALOG_SYNC_ORIGIN: ${{ secrets.CATALOG_SYNC_ORIGIN }}
          CATALOG_SYNC_ORIGIN_B64: ${{ secrets.CATALOG_SYNC_ORIGIN_B64 }}
          CATALOG_SYNC_TOKEN: ${{ secrets.CATALOG_SYNC_TOKEN }}
          CATALOG_SYNC_REF: ${{ secrets.CATALOG_SYNC_REF }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.108.0"
          command: pages deploy out --project-name=dn88

      - name: Route drnote.co to Pages (not old Worker)
        continue-on-error: true
        run: bash scripts/attach-pages-custom-domains.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_PROJECT_NAME: dn88
          PAGES_CNAME_TARGET: dn88.pages.dev
          CLOUDFLARE_ZONE_NAME: drnote.co
          CLOUDFLARE_ZONE_ID: 789a9273b51c942e1f96be6186062963
          LEGACY_WORKER_NAME: drnote-app-v1

      - name: Purge stale Cloudflare cache
        continue-on-error: true
        run: |
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: 789a9273b51c942e1f96be6186062963

      - name: Verify DN88 API health
        continue-on-error: true
        run: |
          API_URL="${NEXT_PUBLIC_DN88_API_URL:-$PRODUCTION_API_URL}"
          echo "Checking $API_URL/health"
          curl -fsS "$API_URL/health"
          echo
          curl -fsS "$API_URL/api/catalog/state" | head -c 200
          echo
        env:
          PRODUCTION_API_URL: ${{ env.PRODUCTION_API_URL }}
          NEXT_PUBLIC_DN88_API_URL: ${{ secrets.NEXT_PUBLIC_DN88_API_URL }}
