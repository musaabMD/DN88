name: Set OpenRouter Worker secret

on:
  workflow_dispatch:
    inputs:
      openrouter_api_key:
        description: OpenRouter API key (sk-or-v1-...)
        required: true
        type: string

jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Put OPENROUTER_API_KEY on dn88-api Worker
        run: printf '%s' "$OPENROUTER_API_KEY" | npx wrangler secret put OPENROUTER_API_KEY -c workers/dn88/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENROUTER_API_KEY: ${{ github.event.inputs.openrouter_api_key }}
